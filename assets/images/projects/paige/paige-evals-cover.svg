<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Paige Benchmark Cover</title>
  <desc id="desc">A schematic cover for a benchmark that improves recognition from 70 to 100.</desc>
  <rect width="1600" height="900" fill="#14110d"/>
  <rect x="90" y="90" width="1420" height="720" fill="#fff" stroke="#1a22ff" stroke-width="10"/>
  <text x="150" y="190" font-family="Arial, sans-serif" font-size="68" font-weight="900" fill="#14110d">BENCHMARK</text>
  <text x="150" y="248" font-family="Arial, sans-serif" font-size="28" fill="#5f5a54">12 real files · recognition from 70 to 100</text>
  <g font-family="Arial, sans-serif" font-weight="900">
    <rect x="150" y="360" width="360" height="230" fill="#f7f1e8" stroke="#14110d" stroke-width="6"/>
    <text x="225" y="500" font-size="86" fill="#ff3b16">70</text>
    <rect x="620" y="360" width="360" height="230" fill="#ff3b16" stroke="#14110d" stroke-width="6"/>
    <text x="680" y="500" font-size="86" fill="#fff">100</text>
    <rect x="1090" y="360" width="260" height="230" fill="#1a22ff" stroke="#14110d" stroke-width="6"/>
    <text x="1150" y="500" font-size="86" fill="#fff">12</text>
  </g>
  <text x="180" y="642" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#14110d">score first</text>
  <text x="660" y="642" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#14110d">fix by buckets</text>
  <text x="1130" y="642" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#14110d">rerun all</text>
</svg>
