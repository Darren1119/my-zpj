<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Paige Metrics Cover</title>
  <desc id="desc">A schematic metrics dashboard for evaluating agent usefulness.</desc>
  <rect width="1600" height="900" fill="#14110d"/>
  <rect x="90" y="90" width="1420" height="720" fill="#fff" stroke="#ff3b16" stroke-width="10"/>
  <text x="150" y="180" font-family="Arial, sans-serif" font-size="54" font-weight="900" fill="#14110d">MEASURING AN AGENT</text>
  <text x="150" y="235" font-family="Arial, sans-serif" font-size="25" fill="#5f5a54">Coverage, correctness, convergence and delivery quality.</text>
  <g font-family="Arial, sans-serif" font-weight="800">
    <rect x="150" y="330" width="260" height="260" fill="#ff3b16"/>
    <text x="190" y="430" font-size="72" fill="#fff">100%</text>
    <text x="190" y="490" font-size="28" fill="#fff">coverage</text>
    <rect x="470" y="330" width="260" height="260" fill="#f7f1e8" stroke="#14110d" stroke-width="6"/>
    <text x="510" y="430" font-size="72" fill="#14110d">852</text>
    <text x="510" y="490" font-size="28" fill="#14110d">assertions</text>
    <rect x="790" y="330" width="260" height="260" fill="#1a22ff"/>
    <text x="830" y="430" font-size="72" fill="#fff">19</text>
    <text x="830" y="490" font-size="28" fill="#fff">test suites</text>
    <rect x="1110" y="330" width="260" height="260" fill="#f7f1e8" stroke="#14110d" stroke-width="6"/>
    <text x="1150" y="430" font-size="72" fill="#14110d">12</text>
    <text x="1150" y="490" font-size="28" fill="#14110d">real files</text>
  </g>
  <path d="M150 685h1220" stroke="#14110d" stroke-width="7"/>
  <path d="M150 685c180-140 340-40 500-125s330-80 520 10 160-20 200-60" fill="none" stroke="#ff3b16" stroke-width="10"/>
</svg>
