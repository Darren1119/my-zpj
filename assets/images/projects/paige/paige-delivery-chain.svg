<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Paige Delivery Chain</title>
  <desc id="desc">A schematic delivery chain from PRD to PageModel to prototype, specs, code and design layers.</desc>
  <rect width="1600" height="900" fill="#f7f1e8"/>
  <rect x="70" y="70" width="1460" height="760" rx="0" fill="#fff" stroke="#14110d" stroke-width="8"/>
  <text x="120" y="150" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="#14110d">PAIGE DELIVERY CHAIN</text>
  <text x="120" y="205" font-family="Arial, sans-serif" font-size="24" fill="#6c6258">PRD becomes one checked page model, then projects into multiple deliverables.</text>
  <g font-family="Arial, sans-serif" font-weight="800" font-size="28" fill="#14110d">
    <rect x="120" y="340" width="210" height="120" fill="#ff3b16" stroke="#14110d" stroke-width="6"/>
    <text x="165" y="412" fill="#fff">PRD</text>
    <path d="M360 400h120" stroke="#14110d" stroke-width="8" marker-end="url(#arrow)"/>
    <rect x="510" y="310" width="270" height="180" fill="#fff" stroke="#14110d" stroke-width="6"/>
    <text x="560" y="390">PageModel</text>
    <text x="560" y="430" font-size="18" font-weight="500" fill="#6c6258">audited / revised</text>
    <path d="M810 400h110" stroke="#14110d" stroke-width="8" marker-end="url(#arrow)"/>
    <rect x="950" y="250" width="210" height="90" fill="#fff" stroke="#14110d" stroke-width="5"/>
    <text x="995" y="306">Prototype</text>
    <rect x="950" y="380" width="210" height="90" fill="#fff" stroke="#14110d" stroke-width="5"/>
    <text x="1002" y="436">Specs</text>
    <rect x="950" y="510" width="210" height="90" fill="#fff" stroke="#14110d" stroke-width="5"/>
    <text x="1008" y="566">Code</text>
    <rect x="1210" y="380" width="230" height="90" fill="#1a22ff" stroke="#14110d" stroke-width="5"/>
    <text x="1252" y="436" fill="#fff">MasterGo</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0l10 5-10 5z" fill="#14110d"/>
    </marker>
  </defs>
</svg>
